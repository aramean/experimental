<script src="../../front/front.js"></script>
<title>Monsters</title>
<template srcdoc="../index" src="../templates/main"></template>
<div include="includes/dialog_monsters.html"></div>
<div class="df aic">
  <h1 class="f1">Monsters</h1>
  <button click="overlay-dialog" class="button round br50 w2r h2r fr bcblack white aic bs1"><i id="updateDetails" class="icon16">&#8854;</i></button>
</div>
<hr class="bcblack01 mt1">
<div class="df mb1 gap1-">
  <input
    id="query"
    type="text"
    value=""
    class="bs1 f3 p1 h3 br05"
    globalize-get="human"
    globalize-target="placeholder"
    autocomplete="off"
    bindfield="search:#list-monsters"
  >
  <select
    id="sort"
    class="bs1 f0 p1 h3 br05 fs08"
    globalize-target="placeholder"
  >
  <option>Updated</option>
  </select>
</div>
<div
  bindasset="endpoint:api.monsters.endpoint"
  bindvar="src:{endpoint};href:monsters;field:monster"
  include="includes/list_monsters.html">
</div>
