<div id="loader" class="loader"></div>
<div
  id="list-humans"
  class="box cards shade1 list br0- bcwhite-"
  bindvar="src;search:"
  bindasset="apikey:api.humans.api_key"
  bindquery="q:q;c:category"
  bindglobal="l:globalize.code"
  ifbeforeend="{c};data-src:&or=(id.eq.{c},taxonomy.eq.{c})"
  data-src="{src}&select=id,first_name,middle_name,last_name,sex&where=first_name->>{l}.ilike(*{search}*)"
  data-header="apikey:{apikey};Prefer:count=exact"
  data-loader="#loader"
  data-onempty="#empty"
  data-iterate="true">
  <a bindvar="href" data-set="i:id" href="{href}.html?i={i}" class="p1">
    <small class="gray f0" paddingright="0.5rem" data-set="s:sex" if="([{s}]:[male])/settext:[&#9794;]?settext:[&#9792;]"></small>
    <p>
       <span
        bindglobal="l:globalize.code"
        data-get="first_name.{l:eng}"
      ></span>&nbsp;<span
        bindglobal="l:globalize.code"
        data-set="m:middle_name.{l:eng}"
        onifdata-set="([{m}]![])/settext:[{m}&nbsp;]"
      ></span><span
        bindglobal="l:globalize.code"
        data-get="last_name.{l:eng}"
      ></span>
    </p>
    <p class="f0 icon">&#128394;</p>
  </a>
</div>
