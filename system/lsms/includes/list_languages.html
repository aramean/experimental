<div id="loader" class="loader"></div>
<div
  id="list-languages"
  class="box cards shade1 list br0- bcwhite-"
  bindvar="src;search:"
  bindasset="apikey:api.api_key"
  bindquery="q:q;c:category"
  bindglobal="l:globalize.code"
  ifbeforeend="{c};data-src:&or=(id.eq.{c},taxonomy.eq.{c})"
  data-src="{src}&where=isSign.eq(false),isExtinct.eq(null),language->>{l}.ilike(*{search}*)"
  data-header="apikey:{apikey};Prefer:count=exact"
  data-loader="#loader"
  data-onempty="#empty"
  data-iterate="true">
  <a bindvar="href" data-set="i:id" href="{href}.html?i={i}" class="p1">
    <figure class="pr">
      <p bindglobal="l:globalize.code" data-get="language.{l:eng}"></p>
    </figure>
    <small class="gray" data-get="iso"></small>
    <p class="f0 icon">&#128394;</p>
  </a>
</div>
